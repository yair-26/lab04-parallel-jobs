name: CI  
on: [push, pull_request, workflow_dispatch]
jobs:
  lint:
     runs-on: ubuntu-latest
     needs: test
     steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: download dependencies
        run: npm ci
      - name: run linter
        run: npm run lint
  test:
     runs-on: ubuntu-latest
     steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: download dependencies
        run: npm ci
      - name: run tests
        run: npm test
  summary:
     runs-on: ubuntu-latest
     needs: [lint, test]
     steps:
      - name: print summary
        run: echo "Lint and Test jobs completed successfully!"
       
      